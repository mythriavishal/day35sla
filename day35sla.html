<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1. Factorial of a given number
let n = 5

let fact = 1
for(let i = 1; i <= n; i++){
    fact = fact * i
}
console.log("Factorial:", fact)


// 2. Check if number is prime
let num = 7
let prime = true

if(num <= 1){
    prime = false
}
else{
    for(let i = 2; i < num; i++){
        if(num % i === 0){
            prime = false
            break
        }
    }
}
console.log("Prime:", prime)


// 3. Armstrong number check
let arm = 153
let temp = arm
let sum = 0

while(temp > 0){
    let d = temp % 10
    sum = sum + d*d*d
    temp = Math.floor(temp / 10)
}
console.log("Armstrong:", sum === arm)


// 4. Print 5 table
let table = 5
for(let i = 1; i <= 10; i++){
    console.log(i + " * " + table + " = " + (i * table))
}


// 5. Sum of digits
let s = 1234
let total = 0

while(s > 0){
    total = total + (s % 10)
    s = Math.floor(s / 10)
}
console.log("Sum of digits:", total)


// 6. Palindrome check
let str = "MALAYALAM"
let rev = ""

for(let i = str.length - 1; i >= 0; i--){
    rev = rev + str[i]
}
console.log("Palindrome:", str === rev)
    </script>
</body>
</html>
